<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Guide de Paris — Vidolta</title>

<meta name="description" content="Guide complet de Paris avec Vidolta : histoire, monuments, mobilité, restaurants, quartiers incontournables et conseils pour découvrir la capitale autrement.">

<meta name="theme-color" content="#0f172a">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Poppins',sans-serif;
background:#0f172a;
color:white;
overflow-x:hidden;
}

a{
text-decoration:none;
}

img{
display:block;
max-width:100%;
}

/* NAVBAR */

.navbar{
position:sticky;
top:0;
z-index:1000;
width:100%;
padding:16px 24px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(15,23,42,0.88);
backdrop-filter:blur(14px);
border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
font-size:1.7rem;
font-weight:700;
color:#818cf8;
}

.mobile-btn{
display:none;
font-size:2rem;
cursor:pointer;
color:white;
}

.nav-links{
display:flex;
gap:24px;
align-items:center;
}

.nav-links a{
color:#cbd5e1;
transition:0.3s;
}

.nav-links a:hover{
color:#818cf8;
}

/* HERO */

.hero{
position:relative;
height:90vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}

.hero img{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.45);
}

.hero::after{
content:'';
position:absolute;
inset:0;
background:linear-gradient(to bottom,rgba(15,23,42,0.2),rgba(15,23,42,0.85));
}

.hero-content{
position:relative;
z-index:2;
padding:20px;
max-width:900px;
}

.hero h1{
font-size:5rem;
margin-bottom:18px;
}

.hero p{
font-size:1.3rem;
line-height:1.8;
color:#e2e8f0;
}

/* SECTIONS */

.section{
padding:90px 20px;
max-width:1200px;
margin:auto;
}

.section-title{
font-size:2.7rem;
margin-bottom:50px;
text-align:center;
}

.story{
background:#1e293b;
padding:40px;
border-radius:32px;
line-height:2;
color:#cbd5e1;
font-size:1.05rem;
border:1px solid rgba(255,255,255,0.05);
}

.story p{
margin-bottom:28px;
}

/* MONUMENTS */

.monument-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
}

.monument-card{
background:#1e293b;
border-radius:30px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.05);
transition:0.35s;
}

.monument-card:hover{
transform:translateY(-6px);
box-shadow:0 15px 35px rgba(0,0,0,0.35);
}

.monument-card img{
width:100%;
height:260px;
object-fit:cover;
}

.monument-content{
padding:28px;
}

.monument-content h3{
font-size:1.5rem;
margin-bottom:16px;
}

.monument-content p{
line-height:1.8;
color:#cbd5e1;
margin-bottom:20px;
}

.monument-content a{
display:inline-block;
padding:12px 18px;
background:#6366f1;
color:white;
border-radius:14px;
font-weight:600;
}

/* MOBILITE */

.transport-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:24px;
}

.transport-card{
background:#1e293b;
padding:30px;
border-radius:26px;
border:1px solid rgba(255,255,255,0.05);
}

.transport-card h3{
margin-bottom:14px;
font-size:1.3rem;
}

.transport-card p{
line-height:1.8;
color:#cbd5e1;
margin-bottom:18px;
}

.transport-card a{
display:inline-block;
padding:12px 18px;
background:#6366f1;
color:white;
border-radius:14px;
font-weight:600;
}

/* FAQ */

.faq{
background:#1e293b;
padding:35px;
border-radius:30px;
border:1px solid rgba(255,255,255,0.05);
}

.faq-item{
margin-bottom:28px;
}

.faq-item h3{
margin-bottom:12px;
color:#ffffff;
}

.faq-item p{
line-height:1.8;
color:#cbd5e1;
}

/* CTA */

.cta{
background:linear-gradient(135deg,#312e81,#4338ca);
padding:60px 30px;
border-radius:32px;
text-align:center;
}

.cta h2{
font-size:2.5rem;
margin-bottom:20px;
}

.cta p{
max-width:700px;
margin:auto;
line-height:1.8;
margin-bottom:30px;
color:#e2e8f0;
}

.cta a{
display:inline-block;
padding:16px 24px;
background:white;
color:#111827;
font-weight:700;
border-radius:18px;
}

/* FOOTER */

footer{
padding:70px 20px;
text-align:center;
color:#94a3b8;
line-height:2;
}

footer a{
color:#cbd5e1;
}

/* BACK TO TOP */

.back-to-top{
position:fixed;
bottom:25px;
right:25px;
width:52px;
height:52px;
border:none;
border-radius:50%;
background:#6366f1;
color:white;
font-size:1.4rem;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:0.3s;
box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

.back-to-top.show{
opacity:1;
pointer-events:auto;
}

/* MOBILE */

@media(max-width:900px){

.hero{
height:75vh;
}

.hero h1{
font-size:3rem;
}

.hero p{
font-size:1.05rem;
}

.section-title{
font-size:2rem;
}

.mobile-btn{
display:block;
}

.nav-links{
display:none;
position:absolute;
top:78px;
left:20px;
right:20px;
background:rgba(15,23,42,0.96);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.05);
flex-direction:column;
padding:24px;
border-radius:24px;
gap:18px;
box-shadow:0 15px 35px rgba(0,0,0,0.35);
}

.nav-links.active{
display:flex;
}

.story{
padding:28px;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<a href="index.html" class="logo">
🌍 Vidolta
</a>

<div class="mobile-btn" onclick="toggleMenu()">
☰
</div>

<div class="nav-links">

<a href="index.html">Accueil</a>

<a href="#histoire">Histoire</a>

<a href="#monuments">Monuments</a>

<a href="#mobilite">Mobilité</a>

<a href="paris.html">Paris</a>

</div>

</nav>

<!-- LE RESTE DE TON CONTENU NE CHANGE PAS -->

<!-- BACK TO TOP -->

<button class="back-to-top" id="backToTop">
↑
</button>

<script>

function toggleMenu(){
const nav = document.querySelector('.nav-links');
nav.classList.toggle('active');
}

const backToTop = document.getElementById('backToTop');

window.addEventListener('scroll', () => {

if(window.scrollY > 400){
backToTop.classList.add('show');
}else{
backToTop.classList.remove('show');
}

});

backToTop.addEventListener('click', () => {
window.scrollTo({
top:0,
behavior:'smooth'
});
});

</script>

</body>
</html>
