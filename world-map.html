<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>World Map — Vidolta</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/three"></script>
<script src="https://unpkg.com/globe.gl"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;

background:
radial-gradient(circle at top right,rgba(124,92,255,0.18),transparent 30%),
radial-gradient(circle at top left,rgba(91,140,255,0.14),transparent 25%),
linear-gradient(to bottom,#0b1426 0%,#09111f 100%);

overflow:hidden;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
left:0;
right:0;

z-index:1000;

padding:10px 16px;

display:flex;
justify-content:space-between;
align-items:center;

background:rgba(5,8,22,0.72);

backdrop-filter:blur(18px);

border-bottom:1px solid rgba(255,255,255,0.04);
}

.logo{
font-size:1.65rem;
font-weight:800;
color:white;
text-decoration:none;
}

.nav-links{
display:flex;
gap:28px;
}

.nav-links a{
color:#cbd5e1;
text-decoration:none;
font-size:0.95rem;
}

<section class="hero-map">

<div class="hero-container">

<div class="hero-left">

<p class="hero-sub">
MOVE SMARTER. DISCOVER MORE.
</p>

<h1>
Explore le monde <span>autrement</span>
</h1>

<p class="hero-text">
Choisis une destination immersive Vidolta à travers le globe interactif.
</p>

</div>

</div>

</section>

<section class="section">

<div class="globe-wrapper">

<div id="globeViz"></div>

</div>

</section>
  
/* GLOBE */

#globeViz{
position:fixed;
inset:0;
z-index:1;
}

canvas{
display:block;
}

.hero-map{
padding-top:40px;
padding-bottom:10px;
position:relative;
z-index:2;
}

.hero-container{
max-width:1280px;
margin:auto;
padding:0 22px;
}

.hero-left{
max-width:760px;
}

.hero-left h1{
font-size:4.9rem;
line-height:0.92;
letter-spacing:-4px;
margin-bottom:18px;
text-shadow:0 8px 30px rgba(0,0,0,0.25);
color:white;
}

.hero-left h1 span{
background:linear-gradient(90deg,#8b5cf6,#60a5fa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero-text{
font-size:1.08rem;
line-height:1.85;
max-width:620px;
color:#dbe4f0;
margin-bottom:10px;
}

.hero-sub{
font-size:0.82rem;
letter-spacing:2px;
color:#7f8ca6;
margin-bottom:18px;
}

.section{
max-width:1300px;
margin:auto;
padding:0 22px 60px;
}

.globe-wrapper{
position:relative;

height:720px;

border-radius:38px;

overflow:hidden;

background:
linear-gradient(
135deg,
rgba(255,255,255,0.05),
rgba(255,255,255,0.02)
);

border:1px solid rgba(255,255,255,0.06);

backdrop-filter:blur(24px);

box-shadow:
0 30px 80px rgba(0,0,0,0.35);

margin-top:10px;
}

#globeViz{
position:absolute;
inset:0;
z-index:1;
}

</style>

</head>

<body>

<nav class="navbar">

<a href="index.html" class="logo">
🌍 Vidolta
</a>

<div class="nav-links">

<a href="index.html">
Accueil
</a>

<a href="destinations.html">
Destinations
</a>

</div>

</nav>

<script>

const cities = [

{name:'Paris',lat:48.8566,lng:2.3522,page:'paris.html'},
{name:'Londres',lat:51.5072,lng:-0.1276,page:'londres.html'},
{name:'Tokyo',lat:35.6762,lng:139.6503,page:'tokyo.html'},
{name:'New York',lat:40.7128,lng:-74.0060,page:'new-york.html'},
{name:'Rio',lat:-22.9068,lng:-43.1729,page:'rio.html'},
{name:'Rome',lat:41.9028,lng:12.4964,page:'rome.html'},
{name:'Barcelone',lat:41.3874,lng:2.1686,page:'barcelone.html'},
{name:'Amsterdam',lat:52.3676,lng:4.9041,page:'amsterdam.html'},
{name:'Athènes',lat:37.9838,lng:23.7275,page:'athenes.html'},
{name:'Istanbul',lat:41.0082,lng:28.9784,page:'istanbul.html'},
{name:'Séoul',lat:37.5665,lng:126.9780,page:'seoul.html'},
{name:'Dubaï',lat:25.2048,lng:55.2708,page:'dubai.html'},
{name:'Montréal',lat:45.5019,lng:-73.5674,page:'montreal.html'},
{name:'Marrakech',lat:31.6295,lng:-7.9811,page:'marrakech.html'},
{name:'Munich',lat:48.1351,lng:11.5820,page:'munich.html'},
{name:'Prague',lat:50.0755,lng:14.4378,page:'prague.html'},
{name:'Palma',lat:39.5696,lng:2.6502,page:'majorque.html'},
{name:'Nantes',lat:47.2184,lng:-1.5536,page:'nantes.html'},
{name:'Bordeaux',lat:44.8378,lng:-0.5792,page:'bordeaux.html'},
{name:'Marseille',lat:43.2965,lng:5.3698,page:'marseille.html'}

];

window.addEventListener('load', () => {

const globe = Globe()
(document.getElementById('globeViz'))

.globeImageUrl('https://raw.githubusercontent.com/vasturiano/three-globe/master/example/img/earth-blue-marble.jpg')

.backgroundColor('rgba(0,0,0,0)')

.width(window.innerWidth)

.height(window.innerHeight)

.pointsData(cities)

.pointLat(d => d.lat)

.pointLng(d => d.lng)

.pointAltitude(0.02)

.pointRadius(0.32)

.pointColor(() => '#8b5cf6')

.atmosphereColor('#5b8cff')

.atmosphereAltitude(0.16)

.onPointClick(d => {
window.location.href = d.page;
});

globe.pointOfView({
lat:-12,
lng:10,
altitude:1.95
});

globe.controls().autoRotate = false;
  
window.addEventListener('resize', () => {

globe
.width(window.innerWidth)
.height(window.innerHeight);

});

});

</script>

</body>

</html>
