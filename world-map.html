<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg:#050816;
--primary:#7c5cff;
--primary2:#5b8cff;
--text:#ffffff;
--muted:#94a3b8;
}

 html{
scroll-behavior:smooth;
scroll-padding-top:80px;
}

body{
font-family:'Poppins',sans-serif;

background:
radial-gradient(circle at top right,rgba(124,92,255,0.18),transparent 30%),
radial-gradient(circle at top left,rgba(91,140,255,0.14),transparent 25%),
linear-gradient(to bottom,#0b1426 0%,#09111f 100%);

color:white;

overflow-x:hidden;
}

/* NAVBAR */

.navbar{
position:sticky;
top:0;
z-index:1000;

padding:10px 16px;

display:flex;
justify-content:space-between;
align-items:center;

background:rgba(5,8,22,0.72);

backdrop-filter:blur(18px);

border-bottom:1px solid rgba(255,255,255,0.04);
}

.logo{
display:inline-flex;
align-items:center;

font-size:1.65rem;
font-weight:800;

color:white;

text-decoration:none;
}

.nav-links{
display:flex;
gap:28px;
align-items:center;
}

.nav-links a{
color:#cbd5e1;
font-size:0.95rem;
transition:0.3s;
text-decoration:none;
}

.nav-links a:hover{
color:white;
}

/* HERO */

.hero-map{
padding-top:40px;
padding-bottom:10px;
position:relative;
z-index:2;
}

.hero-container{
max-width:1280px;
margin:auto;
padding:0 22px;
}

.hero-left{
max-width:760px;
}

.hero-left h1{
font-size:4.9rem;
line-height:0.92;
letter-spacing:-4px;
margin-bottom:18px;
text-shadow:0 8px 30px rgba(0,0,0,0.25);
color:white;
}

.hero-left h1 span{
background:linear-gradient(90deg,#8b5cf6,#60a5fa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero-text{
font-size:1.08rem;
line-height:1.85;
max-width:620px;
color:#dbe4f0;
margin-bottom:10px;
}

.hero-sub{
font-size:0.82rem;
letter-spacing:2px;
color:#7f8ca6;
margin-bottom:18px;
}

/* SECTION */

.section{
max-width:1300px;
margin:auto;
padding:0 22px 60px;
}

/* GLOBE */

.globe-wrapper{
position:relative;

height:720px;

border-radius:38px;

overflow:hidden;

background:
linear-gradient(
135deg,
rgba(255,255,255,0.05),
rgba(255,255,255,0.02)
);

border:1px solid rgba(255,255,255,0.06);

backdrop-filter:blur(24px);

box-shadow:
0 30px 80px rgba(0,0,0,0.35);

margin-top:10px;
}

#globeViz{
position:absolute;
inset:0;
z-index:1;
}

canvas{
display:block;
}

/* FOOTER */

footer{
padding:70px 22px;
text-align:center;
line-height:2;
color:#94a3b8;
}

.footer-links{
margin-top:18px;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:18px;
}

.footer-links a{
color:#cbd5e1;
text-decoration:none;
transition:0.3s;
}

.footer-links a:hover{
color:white;
}
  
/* MOBILE */

@media(max-width:900px){

.hero-left h1{
font-size:2.9rem;
letter-spacing:-2px;
}

.hero-text{
font-size:0.92rem;
line-height:1.7;
}

.globe-wrapper{
height:520px;
border-radius:28px;
}

}

</style>

</head>

</p>

<h1>
Explore le monde <span>autrement</span>
</h1>

<p class="hero-text">
Choisis une destination immersive Vidolta à travers le globe interactif.
</p>

</div>

</div>

</section>

<!-- GLOBE -->

<section class="section">

<div class="globe-wrapper">

<div id="globeViz"></div>

</div>

</section>

<script>

/* DESTINATIONS */

const cities = [

{name:'Paris',lat:48.8566,lng:2.3522,page:'paris.html'},
{name:'Londres',lat:51.5072,lng:-0.1276,page:'londres.html'},
{name:'Tokyo',lat:35.6762,lng:139.6503,page:'tokyo.html'},
{name:'New York',lat:40.7128,lng:-74.0060,page:'new-york.html'},
{name:'Rio',lat:-22.9068,lng:-43.1729,page:'rio.html'},
{name:'Rome',lat:41.9028,lng:12.4964,page:'rome.html'},
{name:'Barcelone',lat:41.3874,lng:2.1686,page:'barcelone.html'},
{name:'Amsterdam',lat:52.3676,lng:4.9041,page:'amsterdam.html'},
{name:'Athènes',lat:37.9838,lng:23.7275,page:'athenes.html'},
{name:'Istanbul',lat:41.0082,lng:28.9784,page:'istanbul.html'},
{name:'Séoul',lat:37.5665,lng:126.9780,page:'seoul.html'},
{name:'Dubaï',lat:25.2048,lng:55.2708,page:'dubai.html'},
{name:'Montréal',lat:45.5019,lng:-73.5674,page:'montreal.html'},
{name:'Marrakech',lat:31.6295,lng:-7.9811,page:'marrakech.html'},
{name:'Munich',lat:48.1351,lng:11.5820,page:'munich.html'},
{name:'Prague',lat:50.0755,lng:14.4378,page:'prague.html'},
{name:'Palma',lat:39.5696,lng:2.6502,page:'majorque.html'},
{name:'Nantes',lat:47.2184,lng:-1.5536,page:'nantes.html'},
{name:'Bordeaux',lat:44.8378,lng:-0.5792,page:'bordeaux.html'},
{name:'Marseille',lat:43.2965,lng:5.3698,page:'marseille.html'},
{name:'Lyon',lat:45.7640,lng:4.8357,page:'lyon.html'},
{name:'Miami',lat:25.7617,lng:-80.1918,page:'miami.html'}

];

window.addEventListener('load', () => {

const globe = Globe()
(document.getElementById('globeViz'))

.globeImageUrl(
'https://raw.githubusercontent.com/vasturiano/three-globe/master/example/img/earth-blue-marble.jpg'
)

.backgroundColor('rgba(0,0,0,0)')

.width(document.querySelector('.globe-wrapper').offsetWidth)

.height(document.querySelector('.globe-wrapper').offsetHeight)

.pointsData(cities)

.pointLat(d => d.lat)

.pointLng(d => d.lng)

.pointAltitude(0)

.pointRadius(0.22)

.pointResolution(18)

.pointColor(() => 'rgba(255,255,255,0.92)')

.atmosphereColor('#60a5fa')

.atmosphereAltitude(0.16)

.pointLabel(d => `
<div style="
font-family:Poppins;
padding:10px 14px;
border-radius:16px;
background:rgba(15,23,42,0.96);
color:white;
font-size:13px;
font-weight:600;
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
box-shadow:0 10px 30px rgba(0,0,0,0.35);
">
${d.name}
</div>
`)

.onPointClick(d => {
window.location.href = d.page;
});

globe.pointOfView({
lat:28,
lng:12,
altitude:1.95
});

const controls = globe.controls();

controls.autoRotate = false;

controls.enableZoom = true;

controls.enablePan = false;

controls.rotateSpeed = 0.8;

controls.zoomSpeed = 0.8;

window.addEventListener('resize', () => {

globe
.width(document.querySelector('.globe-wrapper').offsetWidth)
.height(document.querySelector('.globe-wrapper').offsetHeight);

});

});

</script>
