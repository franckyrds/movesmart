<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>World Map — Vidolta</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/three"></script>
<script src="https://unpkg.com/globe.gl"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;

background:
radial-gradient(circle at top right,rgba(124,92,255,0.18),transparent 30%),
linear-gradient(to bottom,#0b1426 0%,#09111f 100%);

overflow:hidden;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
left:0;
right:0;

z-index:1000;

padding:10px 16px;

display:flex;
justify-content:space-between;
align-items:center;

background:rgba(5,8,22,0.72);

backdrop-filter:blur(18px);

border-bottom:1px solid rgba(255,255,255,0.04);
}

.logo{
font-size:1.65rem;
font-weight:800;
color:white;
text-decoration:none;
}

.nav-links{
display:flex;
gap:28px;
}

.nav-links a{
color:#cbd5e1;
text-decoration:none;
font-size:0.95rem;
}

/* GLOBE */

#globeViz{
position:fixed;
inset:0;
z-index:1;
}

canvas{
display:block;
}

</style>

</head>

<body>

<nav class="navbar">

<a href="index.html" class="logo">
🌍 Vidolta
</a>

<div class="nav-links">

<a href="index.html">
Accueil
</a>

<a href="destinations.html">
Destinations
</a>

</div>

</nav>

<div id="globeViz"></div>

<script>

const cities = [

{
name:'Paris',
lat:48.8566,
lng:2.3522,
page:'paris.html'
},

{
name:'Tokyo',
lat:35.6762,
lng:139.6503,
page:'tokyo.html'
},

{
name:'New York',
lat:40.7128,
lng:-74.0060,
page:'new-york.html'
},

{
name:'Rio',
lat:-22.9068,
lng:-43.1729,
page:'rio.html'
},

{
name:'Londres',
lat:51.5072,
lng:-0.1276,
page:'londres.html'
}

];

window.addEventListener('load', () => {

const globe = Globe()
(document.getElementById('globeViz'))

.globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')

.backgroundColor('rgba(0,0,0,0)')

.width(window.innerWidth)

.height(window.innerHeight)

.pointsData(cities)

.pointLat(d => d.lat)

.pointLng(d => d.lng)

.pointAltitude(0.02)

.pointRadius(0.5)

.pointColor(() => '#8b5cf6')

.onPointClick(d => {
window.location.href = d.page;
});

globe.controls().autoRotate = true;

globe.controls().autoRotateSpeed = 0.4;

globe.pointOfView({
lat:20,
lng:10,
altitude:1.5
});

window.addEventListener('resize', () => {

globe
.width(window.innerWidth)
.height(window.innerHeight);

});

});

</script>

</body>

</html>
