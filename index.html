<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Vidolta — Mobilité, restaurants et découvertes urbaines</title>

<meta name="description"
content="Vidolta te guide partout où tu vas : mobilité, restaurants, activités et découvertes urbaines dans les plus belles villes.">

<meta name="theme-color" content="#060b1f">

<link rel="icon" href="favicon.ico">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg:#050816;
--primary:#7c5cff;
--primary2:#5b8cff;
--text:#ffffff;
--muted:#94a3b8;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Poppins',sans-serif;

background:
radial-gradient(circle at top right,rgba(124,92,255,0.20),transparent 30%),
radial-gradient(circle at top left,rgba(91,140,255,0.15),transparent 25%),
linear-gradient(to bottom,#081120 0%,#050816 100%);

color:var(--text);

overflow-x:hidden;

padding-bottom:95px;
}

a{
text-decoration:none;
}

img{
display:block;
}

/* NAVBAR */

.navbar{
position:sticky;
top:0;
z-index:1000;

padding:14px 18px;

display:flex;
justify-content:space-between;
align-items:center;

background:rgba(5,8,22,0.72);

backdrop-filter:blur(18px);

border-bottom:1px solid rgba(255,255,255,0.04);
}

.logo{
font-size:1.65rem;
font-weight:800;
}

.nav-links{
display:flex;
gap:28px;
align-items:center;
}

.nav-links a{
color:#cbd5e1;
font-size:0.95rem;
transition:0.3s;
}

.nav-links a:hover{
color:white;
}

.explorer-link{
font-size:0.82rem !important;
color:#94a3b8 !important;
}

.mobile-btn{
display:none;
font-size:2rem;
cursor:pointer;
}

/* HERO */

.hero{
min-height:92vh;

padding:70px 22px 40px;

position:relative;
overflow:hidden;

display:flex;
align-items:center;
}

.hero::before{
content:"";

position:absolute;

width:520px;
height:520px;

background:#7c5cff;

filter:blur(140px);

opacity:0.18;

top:-140px;
right:-140px;

border-radius:50%;
}

.hero::after{
content:"";

position:absolute;

width:320px;
height:320px;

background:#2563eb;

filter:blur(120px);

opacity:0.10;

left:-100px;
bottom:-100px;

border-radius:50%;
}

.hero-container{
max-width:1280px;

margin:auto;

position:relative;
z-index:2;

display:grid;
grid-template-columns:1.1fr 0.9fr;

gap:40px;

align-items:center;
}

.hero-left h1{
font-size:5.7rem;

line-height:0.98;

margin-bottom:24px;

max-width:720px;

text-shadow:0 8px 30px rgba(0,0,0,0.25);
}

.hero-left h1 span{
background:linear-gradient(90deg,#8b5cf6,#60a5fa);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero-text{
font-size:1.15rem;

line-height:1.9;

max-width:620px;

color:#dbe4f0;

margin-bottom:10px;
}

.hero-sub{
font-size:0.85rem;

letter-spacing:2px;

color:#7f8ca6;

margin-bottom:34px;
}

/* SEARCH */

.search-box{
display:flex;

gap:16px;

margin-bottom:34px;
}

.search-wrapper{
flex:1;
position:relative;
}

.search-wrapper input{
width:100%;

height:74px;

padding:0 24px 0 62px;

border:none;
outline:none;

border-radius:28px;

background:rgba(255,255,255,0.07);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,0.08);

color:white;

font-size:1rem;
}

.search-wrapper input::placeholder{
color:#94a3b8;
}

.search-icon{
position:absolute;

left:22px;
top:50%;

transform:translateY(-50%);

font-size:1.2rem;
}

.discover-button{
padding:0 34px;

border:none;

border-radius:28px;

background:linear-gradient(135deg,#8b5cf6,#5b8cff);

color:white;

font-weight:700;

font-size:1rem;

cursor:pointer;

box-shadow:0 12px 40px rgba(124,92,255,0.42);

transition:0.35s;
}

.discover-button:hover{
transform:translateY(-4px) scale(1.02);
}

/* CATEGORY */

.category-grid{
display:grid;

grid-template-columns:repeat(2,1fr);

gap:22px;
}

.category-card{
background:linear-gradient(
135deg,
rgba(18,26,52,0.92),
rgba(12,18,38,0.88)
);

border:1px solid rgba(255,255,255,0.06);

border-radius:32px;

padding:24px;

min-height:128px;

backdrop-filter:blur(18px);

box-shadow:0 12px 35px rgba(0,0,0,0.24);

transition:0.4s;

position:relative;

overflow:hidden;

display:flex;

gap:18px;

align-items:center;
}

.category-card:hover{
transform:translateY(-8px) scale(1.02);

border-color:rgba(124,92,255,0.34);
}

.category-icon{
width:72px;
height:72px;

border-radius:24px;

background:linear-gradient(135deg,#7c5cff,#5b8cff);

font-size:2rem;

flex-shrink:0;

display:flex;
justify-content:center;
align-items:center;
}

.category-card h3{
font-size:1.2rem;
margin-bottom:6px;
}

.category-card p{
font-size:0.92rem;

line-height:1.6;

color:#94a3b8;
}

/* HERO RIGHT */

.hero-right{
position:relative;

display:flex;
justify-content:center;
}

.orbit1{
position:absolute;

width:520px;
height:520px;

border-radius:50%;

border:2px dashed rgba(124,92,255,0.18);

animation:rotateOrbit 30s linear infinite;
}

.planet{
width:470px;
max-width:100%;

position:relative;
z-index:2;

animation:float 6s ease-in-out infinite;

filter:drop-shadow(0 30px 80px rgba(91,140,255,0.35));
}

@keyframes float{

0%,100%{
transform:translateY(0px);
}

50%{
transform:translateY(-18px);
}

}

@keyframes rotateOrbit{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}

/* SECTION */

.section{
max-width:1300px;

margin:auto;

padding:90px 22px;
}

.section-header{
display:flex;

justify-content:space-between;
align-items:center;

margin-bottom:40px;
}

.section-header h2{
font-size:3rem;
line-height:1.1;
}

.section-header a{
color:#cbd5e1;

background:rgba(255,255,255,0.06);

padding:14px 20px;

border-radius:18px;

border:1px solid rgba(255,255,255,0.06);
}

/* DESTINATIONS */

.destinations-grid{
display:flex;

gap:22px;

overflow-x:auto;

scroll-snap-type:x mandatory;

padding-bottom:12px;

scrollbar-width:none;
}

.destinations-grid::-webkit-scrollbar{
display:none;
}

.destination-card{
min-width:290px;
height:360px;

scroll-snap-align:start;

border-radius:34px;

overflow:hidden;

position:relative;

cursor:pointer;

flex-shrink:0;

border:1px solid rgba(255,255,255,0.08);

box-shadow:
0 18px 40px rgba(0,0,0,0.26),
inset 0 1px 0 rgba(255,255,255,0.04);

transition:0.4s;
}

.destination-card:hover{
transform:translateY(-10px);
}

.destination-card img{
width:100%;
height:100%;

object-fit:cover;

transition:0.7s;
}

.destination-card:hover img{
transform:scale(1.10);
}

.destination-overlay{
position:absolute;

inset:0;

padding:28px;

display:flex;

flex-direction:column;
justify-content:flex-end;

background:linear-gradient(
to top,
rgba(0,0,0,0.90),
rgba(0,0,0,0.15)
);
}

.destination-overlay h3{
font-size:2.1rem;
margin-bottom:6px;
}

.destination-overlay p{
color:#d1d5db;
}

/* CTA */

.cta-box{
margin-top:30px;

padding:70px 30px;

border-radius:42px;

text-align:center;

background:linear-gradient(
135deg,
rgba(124,92,255,0.22),
rgba(91,140,255,0.16)
);

backdrop-filter:blur(24px);

border:1px solid rgba(255,255,255,0.08);
}

.cta-box h2{
font-size:3rem;
margin-bottom:20px;
}

.cta-box p{
max-width:760px;

margin:auto;

line-height:1.9;

color:#dbe4f0;

margin-bottom:34px;
}

.cta-box a{
display:inline-block;

padding:18px 30px;

border-radius:18px;

background:white;

color:#111827;

font-weight:700;

transition:0.3s;
}

.cta-box a:hover{
transform:translateY(-3px);
}

/* FOOTER */

footer{
padding:80px 22px;

text-align:center;

line-height:2;

color:#94a3b8;
}

.footer-links{
margin-top:18px;

display:flex;
justify-content:center;

flex-wrap:wrap;

gap:18px;
}

.footer-links a{
color:#cbd5e1;
}

/* TOAST */

.toast{
position:fixed;

bottom:100px;
left:50%;

transform:translateX(-50%);

padding:16px 22px;

border-radius:18px;

background:rgba(17,24,39,0.95);

border:1px solid rgba(255,255,255,0.06);

opacity:0;

pointer-events:none;

transition:0.4s;

z-index:9999;
}

.toast.show{
opacity:1;
}

/* ANIMATION */

.fade-up{
opacity:0;

transform:translateY(35px);

transition:0.8s ease;
}

.fade-up.visible{
opacity:1;

transform:translateY(0);
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;

bottom:0;
left:0;
right:0;

height:84px;

background:rgba(6,10,24,0.92);

backdrop-filter:blur(20px);

border-top:1px solid rgba(255,255,255,0.06);

z-index:9999;

display:flex;

justify-content:space-around;
align-items:center;

box-shadow:0 -10px 30px rgba(0,0,0,0.35);
}

.bottom-nav a{
display:flex;

flex-direction:column;

align-items:center;

gap:5px;

font-size:0.82rem;

color:#94a3b8;

transition:0.3s;
}

.bottom-nav span{
font-size:1.45rem;
}

.bottom-nav a.active{
color:white;

transform:translateY(-3px);
}

.bottom-nav a.active span{
color:#8b5cf6;
}

/* MOBILE */
@media(max-width:700px){

.mobile-btn{
display:block;
}

.nav-links{
display:none;
position:absolute;
top:78px;
left:20px;
right:20px;
background:#111827;
padding:26px;
border-radius:26px;
flex-direction:column;
z-index:999;
}

.nav-links.active{
display:flex;
}

/* HERO */

.hero{
min-height:auto;
padding:18px 18px 24px;
}

.hero-container{
display:grid;
grid-template-columns:1fr 170px;
gap:12px;
align-items:start;
}

.hero-left{
margin-top:8px;
}

.hero-right{
display:flex;
justify-content:flex-end;
align-items:flex-start;
margin-top:10px;
}

/* TITRE */

.hero-left h1{
font-size:3.15rem;
line-height:0.92;
max-width:100%;
margin-bottom:14px;
letter-spacing:-2px;
}

.hero-left h1 span{
display:block;
margin-top:4px;
}

/* TEXTE */

.hero-text{
font-size:0.98rem;
line-height:1.6;
margin-top:6px;
max-width:95%;
}

.hero-sub{
font-size:0.74rem;
margin-top:12px;
margin-bottom:24px;
letter-spacing:1.5px;
}

/* GLOBE */

.orbit1{
display:none;
}

.planet{
width:165px;
animation:none;
filter:drop-shadow(0 12px 40px rgba(91,140,255,0.35));
}

/* SEARCH */

.search-box{
margin-top:20px;
flex-direction:column;
gap:14px;
}

.search-wrapper input{
height:66px;
font-size:0.95rem;
border-radius:24px;
}

.discover-button{
height:66px;
width:100%;
border-radius:24px;
}

/* CATEGORIES */

.category-grid{
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:4px;
}

.category-card{
padding:16px;
min-height:108px;
border-radius:24px;
gap:14px;
}

.category-icon{
width:54px;
height:54px;
font-size:1.4rem;
border-radius:18px;
}

.category-card h3{
font-size:0.98rem;
line-height:1.1;
}

.category-card p{
font-size:0.76rem;
line-height:1.35;
margin-top:4px;
}

/* SECTION */

.section{
padding:42px 18px;
}

.section-header{
flex-direction:row;
align-items:center;
margin-bottom:22px;
}

.section-header h2{
font-size:2rem;
line-height:1;
}

/* DESTINATIONS */

.destinations-grid{
gap:14px;
}

.destination-card{
min-width:170px;
height:240px;
border-radius:26px;
}

.destination-overlay{
padding:18px;
}

.destination-overlay h3{
font-size:1.45rem;
margin-bottom:2px;
}

.destination-overlay p{
font-size:0.82rem;
}

/* CTA */

.cta-box{
padding:42px 20px;
border-radius:32px;
}

.cta-box h2{
font-size:1.9rem;
line-height:1.1;
}

.cta-box p{
font-size:0.95rem;
line-height:1.7;
}

/* BOTTOM NAV */

.bottom-nav{
height:74px;
}

.bottom-nav span{
font-size:1.25rem;
}

}

</style>

<div class="bottom-nav">

</a>

</div>

<script>

function normalizeText(text){
return text
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g, "");
}

function searchCity(){

const input = normalizeText(
document.getElementById('cityInput').value.trim()
);

const availableCities = [
'paris',
'rome',
'barcelone',
'marrakech',
'lyon',
'nantes',
'marseille',
'bordeaux',
'amsterdam',
'majorque',
'athenes'
];

if(availableCities.includes(input)){
window.location.href = input + '.html';
}else{
showToast();
}

}

function showToast(){

const toast = document.getElementById('toast');

toast.classList.add('show');

setTimeout(() => {
toast.classList.remove('show');
},2500);

}

function toggleMenu(){

const nav = document.querySelector('.nav-links');

nav.classList.toggle('active');

}

const observer = new IntersectionObserver(entries => {

entries.forEach(entry => {

if(entry.isIntersecting){
entry.target.classList.add('visible');
}

});

},{
threshold:0.15
});

document.querySelectorAll('.fade-up').forEach(el => {
observer.observe(el);
});

</script>

</body>
</html>
