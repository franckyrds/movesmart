<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>🌍 Vidolta — Te guide partout où tu vas</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Poppins',sans-serif;
background:#0f172a;
color:white;
}

a{
text-decoration:none;
}

/* NAVBAR */

.navbar{
width:100%;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
backdrop-filter:blur(12px);
background:rgba(15,23,42,0.88);
border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
font-size:2rem;
font-weight:700;
}

.nav-links{
display:flex;
gap:24px;
align-items:center;
}

.nav-links a{
color:#cbd5e1;
font-weight:500;
transition:0.3s;
}

.nav-links a:hover{
color:#818cf8;
}

.explorer-link{
font-size:0.8rem;
color:#94a3b8 !important;
}

/* HERO */

.hero{
padding:110px 20px 80px;
text-align:center;
background:linear-gradient(180deg,#0f172a 0%, #111827 100%);
}

.hero h1{
font-size:4rem;
margin-bottom:15px;
}

.hero-main{
font-size:1.5rem;
margin-bottom:8px;
}

.subtitle-en{
font-size:0.72rem;
color:#94a3b8;
opacity:0.4;
letter-spacing:1px;
margin-bottom:40px;
}

.search-container{
max-width:560px;
margin:auto;
display:flex;
gap:12px;
}

.search-container input{
flex:1;
padding:18px;
border-radius:16px;
border:none;
outline:none;
font-size:1rem;
}

.discover-button{
padding:18px 24px;
border:none;
border-radius:16px;
background:#6366f1;
color:white;
font-weight:600;
cursor:pointer;
}

/* SECTION */

.section{
padding:70px 20px;
max-width:1300px;
margin:auto;
}

.section-title{
text-align:center;
font-size:2.4rem;
margin-bottom:45px;
}

/* DESTINATIONS */

.cities-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:22px;
}

.city-card{
position:relative;
height:220px;
border-radius:24px;
overflow:hidden;
cursor:pointer;
transition:0.4s;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.city-card:hover{
transform:translateY(-8px);
}

.city-card img{
width:100%;
height:100%;
object-fit:cover;
}

.city-overlay{
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.15));
display:flex;
align-items:end;
padding:22px;
}

.city-overlay h3{
font-size:1.4rem;
}

/* FOOTER */

footer{
text-align:center;
padding:60px 20px;
color:#94a3b8;
line-height:2;
}

/* MOBILE */

@media(max-width:900px){

.nav-links{
display:none;
}

.hero h1{
font-size:3rem;
}

.search-container{
flex-direction:column;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">🌍 Vidolta</div>

<div class="nav-links">

<a href="#">Accueil</a>
<a href="#">Mobilité</a>
<a href="#">Restaurants</a>
<a href="#">Découvrir</a>

<a href="https://www.google.com/maps"
target="_blank"
class="explorer-link">

Explorer

</a>

</div>

</nav>

<!-- HERO -->

<section class="hero">

<h1>🌍 Vidolta</h1>

<p class="hero-main">
Te guide partout où tu vas
</p>

<p class="subtitle-en">
Move smarter. Discover more.
</p>

<div class="search-container">

<input type="text"
placeholder="Rechercher une ville...">

<button class="discover-button">
Découvrir
</button>

</div>

</section>

<!-- DESTINATIONS -->

<section class="section">

<h2 class="section-title">
Destinations populaires
</h2>

<div class="cities-grid">

<div class="city-card">

<img src="https://i.ibb.co/VcfFs0Bg/Screenshot-20260514-222533-Gmail-2.jpg">

<div class="city-overlay">
<h3>Nantes</h3>
</div>

</div>

<div class="city-card">

<img src="https://i.ibb.co/BVhMM2sk/Screenshot-20260514-221622-Gmail-2.jpg">

<div class="city-overlay">
<h3>Paris</h3>
</div>

</div>

<div class="city-card">

<img src="https://i.ibb.co/jvX3dNG0/Screenshot-20260516-000603-Chrome.png">

<div class="city-overlay">
<h3>Lyon</h3>
</div>

</div>

<div class="city-card">

<img src="https://i.ibb.co/kg1LzsKQ/Screenshot-20260516-002137-Chrome.png">

<div class="city-overlay">
<h3>Marseille</h3>
</div>

</div>

<div class="city-card">

<img src="https://images.unsplash.com/photo-1512470876302-972faa2aa9a4?q=80&w=1200&auto=format&fit=crop">

<div class="city-overlay">
<h3>Amsterdam</h3>
</div>

</div>

<div class="city-card">

<img src="https://images.unsplash.com/photo-1583422409516-2895a77efded?q=80&w=1200&auto=format&fit=crop">

<div class="city-overlay">
<h3>Barcelone</h3>
</div>

</div>

<div class="city-card">

<img src="https://images.unsplash.com/photo-1513735492246-483525079686?q=80&w=1200&auto=format&fit=crop">

<div class="city-overlay">
<h3>Lisbonne</h3>
</div>

</div>

<div class="city-card">

<img src="https://images.unsplash.com/photo-1552832230-c0197dd311b5?q=80&w=1200&auto=format&fit=crop">

<div class="city-overlay">
<h3>Rome</h3>
</div>

</div>

</div>

</section>

<!-- FOOTER -->

<footer>

<p>
Contact : contact@vidolta.com
</p>

<p>
© 2026 Vidolta — Te guide partout où tu vas.
</p>

</footer>

</body>

</html>
